<div class="container">
  <!-- Courses List Section -->
  <div class="row my-3">
    <div class="d-flex justify-content-between align-items-center">
      <h1 class="mb-3 text-white fw-semibold">Courses</h1>
      <button type="button" class="btn btn-secondary text-white" (click)="(refreshCourses)">
        Refresh
      </button>
    </div>
    @for (course of courses; track $index) {
      <div class="col col-4 gap-3">
        <div class="course-card mb-3">
          <div align="center">
            <img [src]="course.thumbnail" [alt]="course.title" height="200" />
          </div>
          <div class="d-flex justify-content-between align-items-center m-2">
            <h3>{{ course.title }}</h3>
            <span class="badge rounded-pill text-bg-info">
              {{ course.language }}
            </span>
          </div>
          <p class="mx-2">{{ course.description }}</p>
          <span class="mx-2 timestamp"> Updated {{ formatTimeAgo(course.updatedAt) }}</span>
        </div>
      </div>
    } @empty {
      <div class="text-white fs-6">No courses found!</div>
    }
  </div>
  <!-- End Courses List -->
</div>
